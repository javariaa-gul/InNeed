name: frontend
description: "Apka Hunar - Connecting skilled workers with job posters."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.1
  http_parser: ^4.0.2
  shared_preferences: ^2.3.2
  geolocator: ^14.0.2
  image_picker: ^1.1.2       # <--- Yeh line yahan add hogi
  web_socket_channel: ^3.0.1
  socket_io_client: ^3.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  web: true
  windows: true
  macos: true
  linux: true
  remove_alpha_ios: true
  image_path: assets/images/logo.png
  adaptive_icon_background: "#FEFD99"
  adaptive_icon_foreground: assets/images/logo.png

flutter:
  uses-material-design: true
  assets:
    - assets/images/